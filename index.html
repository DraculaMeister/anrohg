<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANRO Honor Guard</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ANRO Honor Guard</h1>

    <div style="text-align: left; margin: 20px auto 5px auto; width: 80%; max-width: 1200px;">
        <input type="text" id="searchInput" placeholder="🔍︎ Search"
            style="padding: 10px; width: 300px; border: 1px solid #757575; font-family: 'Special Elite', sans-serif; background-color: rgba(243, 243, 243, 0.5);">
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Rank</th>
                <th>Assignments</th>
                <th>Join Date</th>
                <th>Activity Status</th>
                <th>Excuse Status</th>
                <th>All-Time Points</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="id-card-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="cardUsername">MEMBER FILE</h2>
            <hr>

            <div class="card-body-container">

                <div class="card-details">
                    <p><strong>Rank:</strong> <span id="card-rank"></span></p>
                    <p><strong>Assignments:</strong> <span id="card-assignments"></span></p>
                    <p><strong>Join Date:</strong> <span id="card-join-date"></span></p>
                    <p><strong>Activity Status:</strong> <span id="card-activity"></span></p>
                    <p><strong>Excuse Status:</strong> <span id="card-excuse"></span></p>
                    <p><strong>All-Time Points:</strong> <span id="card-points"></span></p>
                </div>

                <div class="card-image-container">
                    <img id="card-avatar" src="" alt="">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
