<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANRO Honor Guard</title>

    <link rel="icon" type="image/png" href="favicon.png">
    
    <meta property="og:title" content="ANRO Honor Guard" />
    <meta property="og:description" content="Official Website of the Advanced Noobic Reactor Operations Honor Guard" />
    <meta property="og:type" content="website" />

    <meta property="og:image" content="https://anrohg.vercel.app/favicon.png" />

    <meta name="theme-color" content="#660000">
    
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div id="userInfoCard" class="user-info-card" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <circle cx="12" cy="7" r="4.5" />
            <path d="M4 21a8 8 0 0 1 16 0" />
        </svg>
        <span id="topCardUsername">Guardsman</span>
    </div>

    <div id="authContainer">
        <button id="discordLoginBtn" class="discord-btn">
            <svg class="discord-icon" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.66-10.85,68.43,68.43,0,0,1-10.51-5c.88-.65,1.72-1.34,2.53-2a75.58,75.58,0,0,0,73,0c.81.71,1.65,1.4,2.53,2a68.43,68.43,0,0,1-10.51,5,74.37,74.37,0,0,0,6.66,10.85,105.73,105.73,0,0,0,31-18.83C129.87,50.12,123.81,27.31,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
            </svg>
            Login with Discord
        </button>
    </div>

    <h1>ANRO Honor Guard</h1>

    <div style="text-align: left; margin: 20px auto 5px auto; width: 80%; max-width: 1200px;">
        <input type="text" id="searchInput" placeholder="🔍︎ Search"
            style="padding: 10px; width: 300px; border: 1px solid #757575; font-family: 'Special Elite', sans-serif; background-color: rgba(243, 243, 243, 0.5);">
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Rank</th>
                <th>Assignments</th>
                <th>Join Date</th>
                <th>Activity Status</th>
                <th>Excuse Status</th>
                <th>All-Time Points</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="id-card-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="cardUsername">MEMBER FILE</h2>
            <hr>

            <div class="card-body-container">

                <div class="card-details">
                    <p><strong>Rank:</strong> <span id="card-rank"></span></p>
                    <p><strong>Assignments:</strong> <span id="card-assignments"></span></p>
                    <p><strong>Join Date:</strong> <span id="card-join-date"></span></p>
                    <p><strong>Activity Status:</strong> <span id="card-activity"></span></p>
                    <p><strong>Excuse Status:</strong> <span id="card-excuse"></span></p>
                    <p><strong>All-Time Points:</strong> <span id="card-points"></span></p>
                </div>

                <div class="card-image-container">
                    <img id="card-avatar" src="" alt="">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/auth');
                const data = await res.json();

                if (data.authorized) {
                    document.getElementById('topCardUsername').textContent = data.username;
                    document.getElementById('userInfoCard').style.display = 'flex';

                    const loginBtn = document.getElementById('discordLoginBtn');
                    if (loginBtn) {
                        loginBtn.outerHTML = `
                            <a href="menu.html" style="text-decoration: none; display: inline-block; padding: 10px 20px; font-family: 'Special Elite'; border: 2px solid #660000; color: #660000; background: #f4edd9; box-shadow: 3px 3px 0px #660000; font-weight: bold;">
                                Menu
                            </a>
                        `;
                    }
                }
            } catch (e) {
                console.log("Guest Mode: Not logged in.");
            }
        })
    </script>
</body>
</html>
